<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Oron8</title>

<style>
body {
    background: #0b0f0b;
    color: #33ff33;
    font-family: "Courier New", monospace;
    margin: 0;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

/* Typewriter effect */
h2.type {
    overflow: hidden;
    white-space: nowrap;
    border-right: 2px solid #33ff33;
    width: 0;
    animation: typing 1.5s steps(30, end) forwards, blink 1s infinite;
}

@keyframes typing {
    from { width: 0; }
    to { width: 100%; }
}
@keyframes blink {
    50% { border-color: transparent; }
}

/* Songs */
.song {
    display: flex;
    align-items: center;
    margin: 15px 0;
}

.cover {
    width: 60px;
    height: 60px;
    background: #1a1a1a;
    border: 1px solid #33ff33;
    margin-right: 15px;
}

.song-info {
    flex: 1;
}

.progress {
    height: 5px;
    background: #1a1a1a;
    margin-top: 5px;
}

.bar {
    height: 100%;
    width: 0%;
    background: #33ff33;
}

/* Buttons */
button {
    background: #0b0f0b;
    color: #33ff33;
    border: 1px solid #33ff33;
    margin-right: 10px;
    cursor: pointer;
    font-family: monospace;
}

/* Albums */
.albums {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 15px;
}

.album {
    width: 100%;
    aspect-ratio: 1/1;
    background: #1a1a1a;
    border: 1px solid #33ff33;
    cursor: pointer;
}

.album:hover {
    background: #222;
}
</style>
</head>

<body>
<div class="container">

<h2 class="type">> My Featured Songs</h2>

<div class="song">
    <button onclick="toggle(this,'music/stars.mp3')">▶</button>
    <div class="cover">
        <img src="music/stars.jpg" style="width:100%;height:100%;">
    </div>
    <div class="song-info">
        Stars Dont Fit Squares - Dr Zye
        <div class="progress"><div class="bar"></div></div>
    </div>
</div>

<div class="song">
    <button onclick="toggle(this,'music/infoi.mp3')">▶</button>
    <div class="cover">
        <img src="music/Virtua.jpg" style="width:100%;height:100%;">
    </div>
    <div class="song-info">
        Information Superhighway. -trndytrndy
        <div class="progress"><div class="bar"></div></div>
    </div>
</div>

<div class="song">
    <button onclick="toggle(this,'music/blue.mp3')">▶</button>
    <div class="cover">
        <img src="music/blue.jpg" style="width:100%;height:100%;">
    </div>
    <div class="song-info">
        Blue Monday ´88. -New Order
        <div class="progress"><div class="bar"></div></div>
    </div>
</div>

<h2 class="type">> Albums</h2>
<div class="albums">
    <div class="album" onclick="go('album1.html')"></div>
    <div class="album" onclick="go('album2.html')"></div>
    <div class="album" onclick="go('album3.html')"></div>
</div>

</div>

<audio id="audio"></audio>

<script>
// Reproductor inteligente
const audio = new Audio();
let currentBtn = null;

function toggle(btn, src){
    if(audio.src.includes(src)){
        if(audio.paused){
            audio.play();
            btn.textContent = "⏸";
        } else {
            audio.pause();
            btn.textContent = "▶";
        }
    } else {
        audio.src = src;
        audio.play();
        if(currentBtn) currentBtn.textContent = "▶";
        btn.textContent = "⏸";
        currentBtn = btn;
    }
}

// Barra de progreso
audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    document.querySelectorAll(".song").forEach(song => {
        const bar = song.querySelector(".bar");
        if(song.querySelector("button") === currentBtn){
            bar.style.width = percent + "%";
        } else {
            bar.style.width = "0%";
        }
    });
});

function go(page){
    window.location.href = page;
}
</script>
</body>
</html>
